name: Testy Systemu Bibliotecznego

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4
      
    - name: Konfiguracja środowiska Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Uruchomienie testów (unittest)
      run: python -m unittest test_library.py
